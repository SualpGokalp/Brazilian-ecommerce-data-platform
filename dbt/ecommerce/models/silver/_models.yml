version: 2

models:
  - name: stg_orders
    description: "Temizlenmiş sipariş tablosu"
    columns:
      - name: order_id
        description: "Siparişin benzersiz kimliği"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Siparişi veren müşteri"
        tests:
          - not_null
      - name: order_status
        description: "Sipariş durumu"
        tests:
          - not_null

  - name: stg_order_items
    description: "Temizlenmiş sipariş kalemleri"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: price
        tests:
          - not_null

  - name: stg_customers
    description: "Temizlenmiş müşteri tablosu"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null